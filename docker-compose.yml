version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prescribe-tu-multa-postgres
    environment:
      POSTGRES_USER: prescribeadmin
      POSTGRES_PASSWORD: prescribepassword123
      POSTGRES_DB: prescribe-tu-multa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prescribeadmin -d prescribe-tu-multa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
