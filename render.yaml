services:
  - type: web
    name: prescribetumulta
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_SECRET
        value: prescribe-tu-multa-dev-secret-key-minimum-32-chars-1234567890ab
        scope: build
      - key: NEXTAUTH_URL
        scope: runtime
        value: https://prescribetumulta.onrender.com/
      - key: DATABASE_URL
        value: postgresql://postgres.ezdcwbxyqsbdlyvroixw:ptbt35OuJcNyi9ZB@aws-1-us-west-2.pooler.supabase.com:5432/postgres
databases:
  - name: prescribetumulta-postgres
    databaseName: postgres
    user: postgres
    plan: starter
